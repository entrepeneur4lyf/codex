# Codex Workflow Extract New Crate

## Action

Follow the extract-new-crate workflow:
1. Create new crate directory (e.g., codex-rs/<new-crate>/)
2. Add BUILD.bazel and Cargo.toml for the new crate
3. Move relevant source files from existing crate to new crate
4. Update original crate's Cargo.toml to depend on the new crate
5. Update code in original crate and other consumers to import from the new crate
6. Update workspace-level Cargo.toml and Cargo.lock
7. Add or move tests for the extracted functionality
8. Run CI to verify extraction

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: codex-rs/Cargo.lock, codex-rs/Cargo.toml, codex-rs/<new-crate>/Cargo.toml

